name: Build

# Sanity-Check: stellt bei jedem Push/PR sicher, dass die Astro-Seite baut.
# Das eigentliche Deployment übernimmt Cloudflare Workers Builds.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Astro check (Typprüfung)
        run: npx astro check
